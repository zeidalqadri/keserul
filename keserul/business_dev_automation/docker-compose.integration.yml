version: '3.8'

services:
  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: integration-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Grafana for visualization (optional for integration tests)
  grafana:
    image: grafana/grafana:latest
    container_name: integration-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Test orchestrator service
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: integration-orchestrator
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-test-key}
    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; print('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Integration test runner
  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.integration
    container_name: integration-tests
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - PROMETHEUS_PORT=8000
      - GRAFANA_URL=http://grafana:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-test-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-test-key}
    volumes:
      - ./test-results:/app/test-results
      - ./logs:/app/logs
    depends_on:
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for services to be ready...' &&
        sleep 30 &&
        echo 'Running integration tests...' &&
        python test_integration.py &&
        echo 'Running pytest integration tests...' &&
        pytest test_integration.py -v --junitxml=/app/test-results/integration-results.xml
      "

volumes:
  prometheus_data:
  grafana_data:
  test_results:

networks:
  default:
    name: integration-test-network 