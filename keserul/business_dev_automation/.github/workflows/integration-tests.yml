name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run integration tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    services:
      prometheus:
        image: prom/prometheus:latest
        ports:
          - 9090:9090
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        miniforge-version: latest
        activate-environment: business-dev-automation
        environment-file: environment.yml
        auto-activate-base: false
    
    - name: Conda info
      shell: bash -l {0}
      run: |
        conda info
        conda list
    
    - name: Set up environment variables
      shell: bash -l {0}
      run: |
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
        echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
        echo "PROMETHEUS_PORT=8003" >> $GITHUB_ENV
    
    - name: Run unit tests first
      shell: bash -l {0}
      run: |
        pytest prompt_optimizer_bot/tests/ -v
    
    - name: Run cost tracking tests
      shell: bash -l {0}
      run: |
        python test_cost_tracking.py
    
    - name: Run integration tests
      shell: bash -l {0}
      run: |
        python test_integration.py
    
    - name: Run integration tests with pytest
      shell: bash -l {0}
      run: |
        pytest test_integration.py -v --tb=short
    
    - name: Generate test report
      shell: bash -l {0}
      run: |
        pytest test_integration.py --junitxml=integration-test-results.xml
      if: always()
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results-${{ matrix.python-version }}
        path: integration-test-results.xml
    
    - name: Check Prometheus metrics accessibility
      shell: bash -l {0}
      run: |
        # Wait for metrics server to be ready
        sleep 5
        # Test if metrics endpoint is accessible
        curl -f http://localhost:8003/metrics || echo "Metrics endpoint not accessible"
    
    - name: Cleanup test environment
      shell: bash -l {0}
      run: |
        pkill -f prometheus || true
        pkill -f python || true
      if: always()

  docker-integration-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build test containers
      run: |
        docker build -f Dockerfile.orchestrator -t test-orchestrator .
        docker build -f Dockerfile.outreach -t test-outreach .
    
    - name: Test container functionality
      run: |
        # Test orchestrator container
        docker run --rm test-orchestrator python -c "import sys; print('Container test passed')"
        
        # Test outreach container  
        docker run --rm test-outreach python -c "import sys; print('Container test passed')"
    
    - name: Test docker-compose integration
      run: |
        # Create a minimal docker-compose.test.yml for testing
        cat > docker-compose.test.yml << EOF
        version: '3.8'
        services:
          prometheus:
            image: prom/prometheus:latest
            ports:
              - "9090:9090"
          
          orchestrator:
            build:
              context: .
              dockerfile: Dockerfile.orchestrator
            depends_on:
              - prometheus
            environment:
              - PROMETHEUS_URL=http://prometheus:9090
        EOF
        
        # Test docker-compose configuration
        docker-compose -f docker-compose.test.yml config
        
        # Start services
        docker-compose -f docker-compose.test.yml up -d
        
        # Wait for services to be ready
        sleep 30
        
        # Test Prometheus is accessible
        curl -f http://localhost:9090/-/healthy
        
        # Cleanup
        docker-compose -f docker-compose.test.yml down

  performance-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: 3.11
        miniforge-version: latest
        activate-environment: business-dev-automation
        environment-file: environment.yml
        auto-activate-base: false
    
    - name: Run performance benchmarks
      shell: bash -l {0}
      run: |
        cat > test_performance.py << EOF
        import pytest
        import time
        from shared.cost_manager import get_cost_manager
        from token_tracker import TokenUsage, APIResponse
        
        def test_cost_manager_performance(benchmark):
            """Benchmark cost manager performance under load"""
            cost_manager = get_cost_manager(enable_prometheus=True, prometheus_port=8004)
            
            def run_operations():
                # Simulate 100 concurrent operations
                operations = []
                for i in range(100):
                    op_name = f"perf_test_{i}"
                    cost_manager.start_operation(op_name, {"test": "performance"})
                    
                    # Add API calls
                    for j in range(10):
                        api_response = APIResponse(
                            content=f"Response {j}",
                            token_usage=TokenUsage(50, 25, 75),
                            cost=0.001, thinking_time=0.1,
                            provider="openai", model="gpt-4o"
                        )
                        cost_manager.track_api_call(op_name, api_response)
                    
                    operations.append(op_name)
                
                # Complete all operations
                for op_name in operations:
                    cost_manager.complete_operation(op_name)
            
            result = benchmark(run_operations)
            return result
        EOF
        
        pytest test_performance.py --benchmark-only --benchmark-sort=mean
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-test-results
        path: .benchmarks/

  security-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: 3.11
        miniforge-version: latest
        activate-environment: business-dev-automation
        environment-file: environment.yml
        auto-activate-base: false
    
    - name: Run Bandit security scan
      shell: bash -l {0}
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Run Safety dependency scan
      shell: bash -l {0}
      run: |
        safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-test-results
        path: |
          bandit-report.json
          safety-report.json 