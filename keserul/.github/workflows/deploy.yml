name: Deploy to Production

on:
  push:
    branches: [ main, keserul_main-with-deployment ]
  workflow_dispatch: # Allow manual triggers

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: optimizer-api
  REGION: us-central1
  REGISTRY: gcr.io

jobs:
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/optimizer-dashboard/package-lock.json'

    - name: Install frontend dependencies
      working-directory: frontend/optimizer-dashboard
      run: npm ci

    - name: Build frontend
      working-directory: frontend/optimizer-dashboard
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        VITE_GRAFANA_URL: ${{ secrets.VITE_GRAFANA_URL }}
      run: npm run build

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy frontend/optimizer-dashboard/dist --project-name=optimizer-dashboard --compatibility-date=2024-01-15

  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker to use gcloud as a credential helper
      run: gcloud auth configure-docker

    - name: Build Docker image
      working-directory: business_dev_automation
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest .

    - name: Push Docker image to Google Container Registry
      run: |
        docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 10 \
          --timeout 300 \
          --set-env-vars "OIDC_ISSUER_URL=${{ secrets.OIDC_ISSUER_URL }},OIDC_CLIENT_ID=${{ secrets.OIDC_CLIENT_ID }},OIDC_CLIENT_SECRET=${{ secrets.OIDC_CLIENT_SECRET }},PROMETHEUS_PORT=8001" \
          --port 8000

    - name: Get Cloud Run URL
      id: deploy
      run: |
        URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "Backend deployed to: $URL"

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cypress
      working-directory: frontend/optimizer-dashboard
      run: npm ci

    - name: Run smoke tests
      working-directory: frontend/optimizer-dashboard
      env:
        CYPRESS_BASE_URL: https://optimizer-dashboard.pages.dev
        CYPRESS_API_URL: ${{ needs.deploy-backend.outputs.url }}
      run: npx cypress run --spec "cypress/e2e/smoke.cy.ts" --browser chrome

    - name: Test backend health endpoint
      run: |
        curl -f ${{ needs.deploy-backend.outputs.url }}/health
        echo "Backend health check passed!"

    - name: Test Prometheus metrics endpoint
      run: |
        curl -f ${{ needs.deploy-backend.outputs.url }}/metrics
        echo "Prometheus metrics endpoint accessible!" 