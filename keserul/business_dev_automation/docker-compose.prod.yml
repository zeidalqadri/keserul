version: '3.8'

name: business_dev_automation_prod

services:
  # ================================================
  # Application Services
  # ================================================
  
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: bizdev_orchestrator
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - API_PORT=8000
      - WORKER_CONCURRENCY=4
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=60
      - GOOGLE_SHEETS_CREDENTIALS_PATH=/app/credentials/sheets-service-account.json
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_RATE_LIMIT=90
      - GOOGLE_SHEETS_RETRY_ATTEMPTS=3
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - bizdev_network
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./credentials/sheets-service-account.json:/app/credentials/sheets-service-account.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orchestrator.rule=Host(`api.bizdev.company.com`)"
      - "traefik.http.routers.orchestrator.tls=true"
      - "traefik.http.routers.orchestrator.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  leadgen_worker:
    build:
      context: .
      dockerfile: Dockerfile.leadgen
    container_name: bizdev_leadgen
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - WORKER_CONCURRENCY=2
      - SCRAPER_TIMEOUT=30
      - SCRAPER_DELAY=2
      - SGTECH_RATE_LIMIT=10
      - MDEC_RATE_LIMIT=8
      - GOOGLE_SHEETS_CREDENTIALS_PATH=/app/credentials/sheets-service-account.json
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_RATE_LIMIT=90
      - GOOGLE_SHEETS_RETRY_ATTEMPTS=3
    depends_on:
      - redis
    networks:
      - bizdev_network
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./credentials/sheets-service-account.json:/app/credentials/sheets-service-account.json:ro
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  outreach_worker:
    build:
      context: .
      dockerfile: Dockerfile.outreach
    container_name: bizdev_outreach
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.sendgrid.net}
      - SMTP_PORT=${SMTP_PORT:-587}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@company.com}
      - OUTREACH_RATE_LIMIT=50
      - BATCH_SIZE=10
      - GOOGLE_SHEETS_CREDENTIALS_PATH=/app/credentials/sheets-service-account.json
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_RATE_LIMIT=90
      - GOOGLE_SHEETS_RETRY_ATTEMPTS=3
    depends_on:
      - redis
    networks:
      - bizdev_network
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./credentials/sheets-service-account.json:/app/credentials/sheets-service-account.json:ro
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  perplexity_worker:
    build:
      context: .
      dockerfile: Dockerfile.perplexity
    container_name: bizdev_perplexity
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - RESEARCH_TIMEOUT=120
      - CACHE_TTL=3600
      - MAX_QUERIES_PER_HOUR=30
      - GOOGLE_SHEETS_CREDENTIALS_PATH=/app/credentials/sheets-service-account.json
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID}
      - GOOGLE_SHEETS_RATE_LIMIT=90
      - GOOGLE_SHEETS_RETRY_ATTEMPTS=3
    depends_on:
      - redis
    networks:
      - bizdev_network
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
      - ./credentials/sheets-service-account.json:/app/credentials/sheets-service-account.json:ro
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ================================================
  # Infrastructure Services
  # ================================================

  redis:
    image: redis:7-alpine
    container_name: bizdev_redis
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_PASSWORD:-defaultpassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    networks:
      - bizdev_network
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5



  # ================================================
  # Monitoring & Logging
  # ================================================

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: bizdev_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - bizdev_network
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

  grafana:
    image: grafana/grafana:10.0.0
    container_name: bizdev_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-defaultpassword}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "3000:3000"
    networks:
      - bizdev_network
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro

  loki:
    image: grafana/loki:2.8.0
    container_name: bizdev_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - bizdev_network
    volumes:
      - loki_data:/loki
      - ./config/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.8.0
    container_name: bizdev_promtail
    restart: unless-stopped
    networks:
      - bizdev_network
    volumes:
      - ./logs:/var/log/bizdev:ro
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml

  # ================================================
  # Reverse Proxy & Load Balancer
  # ================================================

  traefik:
    image: traefik:v3.0
    container_name: bizdev_traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    networks:
      - bizdev_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certificates:/certificates
    environment:
      - CF_API_EMAIL=${CLOUDFLARE_EMAIL}
      - CF_API_KEY=${CLOUDFLARE_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.bizdev.company.com`)"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

# ================================================
# Networks
# ================================================

networks:
  bizdev_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ================================================
# Volumes
# ================================================

volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  traefik_certificates:
    driver: local

# ================================================
# Configuration Files Required
# ================================================
# 
# Create these configuration files before deployment:
# 
# - config/redis.conf
# - config/prometheus.yml
# - config/alert-rules.yml
# - config/grafana/dashboards/
# - config/grafana/datasources/
# - config/loki.yml
# - config/promtail.yml
# - config/traefik.yml
# - config/dynamic.yml
# - credentials/sheets-service-account.json
#
# ================================================
# Environment Variables Required
# ================================================
# 
# Create a .env file with these variables:
# 
# # Secrets
# SENDGRID_API_KEY=your_sendgrid_api_key
# PERPLEXITY_API_KEY=your_perplexity_api_key
# REDIS_PASSWORD=your_redis_password
# GRAFANA_PASSWORD=your_grafana_password
# CLOUDFLARE_EMAIL=your_cloudflare_email
# CLOUDFLARE_API_KEY=your_cloudflare_api_key
# 
# # Google Sheets Configuration
# GOOGLE_SHEETS_SPREADSHEET_ID=your_google_sheets_spreadsheet_id
# 
# # SMTP Configuration
# SMTP_HOST=smtp.sendgrid.net
# SMTP_PORT=587
# EMAIL_FROM=noreply@company.com
#
# ================================================
# Deployment Commands
# ================================================
# 
# 1. Copy example environment file:
#    cp .env.example .env
# 
# 2. Edit .env with your values:
#    nano .env
# 
# 3. Create required directories:
#    mkdir -p {output,logs,config/{grafana/dashboards,grafana/datasources},credentials}
# 
# 4. Deploy the stack:
#    docker compose -f docker-compose.prod.yml up -d
# 
# 5. Check status:
#    docker compose -f docker-compose.prod.yml ps
# 
# 6. View logs:
#    docker compose -f docker-compose.prod.yml logs -f
# 
# 7. Scale workers if needed:
#    docker compose -f docker-compose.prod.yml up -d --scale leadgen_worker=3
#
# ================================================ 